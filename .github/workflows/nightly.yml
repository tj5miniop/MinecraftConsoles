name: Nightly Release

on:
  workflow_dispatch: 
  push:
    branches:
      - 'main'
      - 'Test-0303'

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # NEW: Get the current date in YYYY.MM.DD format
    - name: Get Current Date
      id: date
      run: echo "DATE=$(date +'%Y.%m.%d')" >> $GITHUB_ENV
      shell: bash

    - name: Setup msbuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Build
      run: MSBuild.exe MinecraftConsoles.sln /p:Configuration=Release /p:Platform="Windows64"

    - name: Zip Build
      run: 7z a -r LCEWindows64.zip ./x64/Release/*

    - name: Build Changelog
      id: github_release
      uses: mikepenz/release-changelog-builder-action@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Release
      uses: softprops/action-gh-release@v2
      with:
        # Uses the date as the tag (e.g., 2026.03.06)
        tag_name: ${{ env.DATE }}
        name: Nightly Build - ${{ env.DATE }}
        prerelease: true
        files: |
          LCEWindows64.zip
          ./x64/Release/Minecraft.Client.exe
          ./x64/Release/Minecraft.Client.pdb
        body: |
          # NOTICE - this is a fork of the smartcmd/MinecraftConsoles repo which aims to be more bleeding edge, implementing more features and commiting pull requests before upstream
          ## 📝 What's Changed
          ${{ steps.github_release.outputs.changelog }}
          
          ---
          **Build Info:** Compiled on ${{ env.DATE }} (SHA: ${{ github.sha }})
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
